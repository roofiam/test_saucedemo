name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff
        run: make lint_check

  tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      USER_NAME: ${{ secrets.USER_NAME }}
      PASS_WORD: ${{ secrets.PASS_WORD }}
      BASE_URL: ${{ secrets.BASE_URL }}
      BROWSER: Chrome
      ENVIRONMENT: CI
      HEADLESS: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose build

      - name: Debug Chrome environment
        run: |
          HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose run --rm tests sh -lc '
            whoami || true
            id
            echo "HEADLESS=$HEADLESS"
            echo "CHROME_BIN=$CHROME_BIN"
            echo "CHROMEDRIVER_PATH=$CHROMEDRIVER_PATH"
            which chromium || true
            which chromedriver || true
            chromium --version || true
            chromedriver --version || true
            chromium --headless=new --no-sandbox --disable-dev-shm-usage --dump-dom https://example.com | head -n 5
          '

      - name: Run Docker tests
        run: make docker_test_report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

  notify:
    name: Telegram notification
    runs-on: ubuntu-latest
    needs:
      - lint
      - tests
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send Telegram notification
        continue-on-error: true
        env:
          NOTIFICATION_TYPE: ci
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINT_STATUS: ${{ needs.lint.result }}
          TESTS_STATUS: ${{ needs.tests.result }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          AUTHOR: ${{ github.actor }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/telegram_notify.py
