services:
  tests:
    build: .

    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

    env_file:
      - .env.docker

    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/.venv
      UV_CACHE_DIR: /tmp/uv-cache
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      XDG_CONFIG_HOME: /tmp/.config
      HEADLESS: "True"

    volumes:
      - .:/app

    command: uv run pytest
